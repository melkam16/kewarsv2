<!DOCTYPE html>
<html>
  <head>
    <script src="https://d3js.org/d3.v7.min.js"></script>    
  </head>
  <body>
    <script>      
      console.log("some message");
      const canvas = d3.select('body').append('svg')
      .attr('width', 760)
      .attr('height', 700);
      console.log("another message");
      d3.json("ethopia.geojson").then((data) => {

        console.log(`Features: ${data.features.length}`);
        const group = canvas.selectAll('g')
          .data(data.features)
          .enter()
          .append('g');

        const projection = d3.geoAlbers().fitSize([760,700],data);
        const path = d3.geoPath().projection(projection);

        const areas = group.append('path')
          .attr('d', path)
          .attr('class', 'area')
          .attr('fill', 'steelblue');

        let paths = canvas.selectAll("path").data(data.features); 
        paths.enter().append("path").attr('d', path); 
      });

      

    </script>
  </body>

</html>
